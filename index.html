    <style>
    /* 1. 基础重置与深色大屏背景 */
    body {
        background-color: #020616 !important;
        /* 径向渐变营造中心发光感，叠加网格线增强科技感 */
        background-image: 
            radial-gradient(circle at 50% 50%, #081b3d 0%, #020616 100%),
            linear-gradient(rgba(0, 247, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 247, 255, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        color: #ffffff;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        margin: 0;
        padding: 20px;
    }

    /* 2. 页面标题：流光质感 */
    h1 {
        text-align: center;
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: 8px;
        margin-top: 10px;
        margin-bottom: 30px;
        background: linear-gradient(to bottom, #fff 40%, #00d2ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.6));
    }

    /* 3. 图表容器：半透明+荧光边框+装饰角 */
    .chart-container {
        background: rgba(6, 18, 44, 0.6) !important;
        border: 1px solid rgba(0, 210, 255, 0.3) !important;
        border-radius: 2px;
        padding: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 210, 255, 0.1);
        backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
        position: relative;
    }

    /* 四角装饰：模拟图片中的UI零件感 */
    .chart-container::before {
        content: "";
        position: absolute;
        top: -1px; left: -1px;
        width: 12px; height: 12px;
        border-top: 2px solid #00d2ff;
        border-left: 2px solid #00d2ff;
    }

    .chart-container::after {
        content: "";
        position: absolute;
        bottom: -1px; right: -1px;
        width: 12px; height: 12px;
        border-bottom: 2px solid #00d2ff;
        border-right: 2px solid #00d2ff;
    }

    /* 4. 辅助布局容器：隐藏默认背景，让内容悬浮 */
    #parent {
        background: transparent !important;
        border: none !important;
    }

    /* 5. 针对 PyEcharts 默认生成的 DOM 优化 */
    .box {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
        width: 5px;
    }
    ::-webkit-scrollbar-thumb {
        background: #00d2ff;
        border-radius: 10px;
    }
</style>
